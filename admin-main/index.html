<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Main Admin - Personal WebsiteTools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <style>
        body { background: #f8fafc; color: #0f172a; }
        .card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04); }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.35);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 60;
            padding: 1rem;
        }
        .overlay.active { display: flex; }
        .modal-card {
            width: 100%;
            max-width: 780px;
            max-height: calc(100vh - 2rem);
            overflow: auto;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">Main Website Admin</h1>
            <div class="flex gap-2">
                <a href="/" class="px-3 py-2 rounded bg-slate-200 hover:bg-slate-300 text-sm text-slate-800">Back Home</a>
                <button id="logoutBtn" class="px-3 py-2 rounded bg-red-600 hover:bg-red-500 text-sm">Logout</button>
            </div>
        </div>

        <div id="notAuthorized" class="hidden card rounded-lg p-4 mb-4 text-rose-700">
            Not authorized. Login with superadmin account.
        </div>

        <div id="adminContent" class="hidden">
            <div class="card rounded-lg p-4 mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div class="text-sm text-slate-600">Manage products, versions, and downloadable files.</div>
                <div class="flex flex-wrap gap-2">
                    <button id="openAddProductModalBtn" class="px-4 py-2 rounded bg-cyan-600 hover:bg-cyan-500 text-sm font-semibold">+ Add Product</button>
                    <button id="openUpdateModalBtn" class="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold">Update Product</button>
                    <button id="seedDefaultsBtn" class="px-4 py-2 rounded bg-amber-600 hover:bg-amber-500 text-sm font-semibold">Seed Defaults</button>
                    <button id="testAccessBtn" class="px-4 py-2 rounded bg-emerald-600 hover:bg-emerald-500 text-sm font-semibold">Test Access</button>
                </div>
            </div>

            <div class="card rounded-lg p-5">
                <h2 class="text-lg font-semibold mb-4">Products & Download Counts</h2>
                <div class="overflow-auto">
                    <table class="min-w-full text-sm">
                        <thead>
                            <tr class="text-left border-b border-slate-200">
                                <th class="py-2 pr-4">Title</th>
                                <th class="py-2 pr-4">Current Version</th>
                                <th class="py-2 pr-4">Downloads</th>
                                <th class="py-2 pr-4">Active</th>
                                <th class="py-2 pr-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
                <div class="mt-4">
                    <span id="createStatus" class="text-sm text-slate-600"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="addProductModal" class="overlay">
        <div class="card rounded-lg p-5 modal-card">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Add New Product</h2>
                <button id="closeAddProductModalBtn" class="px-3 py-1 rounded bg-slate-200 hover:bg-slate-300 text-sm text-slate-800">Close</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">Title</label>
                    <input id="productTitle" type="text" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div>
                    <label class="block text-sm mb-1">Button Label (optional)</label>
                    <input id="productButtonLabel" type="text" placeholder="Download" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1">Description</label>
                    <textarea id="productDescription" rows="3" class="w-full px-3 py-2 rounded bg-white border border-slate-300"></textarea>
                </div>
                <div class="md:col-span-2 flex items-center gap-2">
                    <input id="productIsWebapp" type="checkbox">
                    <label class="text-sm" for="productIsWebapp">This is a web app (no file upload)</label>
                </div>
                <div id="webappUrlField" class="md:col-span-2 hidden">
                    <label class="block text-sm mb-1">App URL path</label>
                    <input id="productUrl" type="text" placeholder="/Image-Panel-perforated-designer/ or https://example.com" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div id="downloadFields">
                    <div class="md:col-span-2">
                        <label class="block text-sm mb-1">File to upload</label>
                        <input id="productFile" type="file" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                        <div>
                            <label class="block text-sm mb-1">Initial Version</label>
                            <input id="productVersion" type="text" value="v1.0.0" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">Version Notes (optional)</label>
                            <input id="productVersionNotes" type="text" placeholder="Initial release" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <input id="productActive" type="checkbox" checked>
                    <label class="text-sm" for="productActive">Active</label>
                </div>
            </div>
            <div class="mt-4 flex items-center gap-3">
                <button id="createProductBtn" class="px-4 py-2 rounded bg-cyan-600 hover:bg-cyan-500 text-sm font-semibold">Create Product</button>
            </div>
        </div>
    </div>

    <div id="updateProductModal" class="overlay">
        <div class="card rounded-lg p-5 modal-card">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Add Product Update</h2>
                <button id="closeUpdateModalBtn" class="px-3 py-1 rounded bg-slate-200 hover:bg-slate-300 text-sm text-slate-800">Close</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">Product</label>
                    <select id="updateProductId" class="w-full px-3 py-2 rounded bg-white border border-slate-300"></select>
                </div>
                <div>
                    <label class="block text-sm mb-1">New Version</label>
                    <input id="updateVersion" type="text" value="v1.0.1" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1">Update Notes (optional)</label>
                    <input id="updateNotes" type="text" placeholder="Bug fixes / improvements" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1">Update File</label>
                    <input id="updateFile" type="file" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div class="flex items-center gap-2">
                    <input id="removeOlderVersions" type="checkbox">
                    <label class="text-sm" for="removeOlderVersions">Remove older versions from storage after update</label>
                </div>
            </div>
            <div class="mt-4 flex items-center gap-3">
                <button id="addUpdateBtn" class="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold">Upload Update</button>
                <span id="updateStatus" class="text-sm text-slate-600"></span>
            </div>
        </div>
    </div>

    <div id="editProductModal" class="overlay">
        <div class="card rounded-lg p-5 modal-card">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Edit Product</h2>
                <button id="closeEditModalBtn" class="px-3 py-1 rounded bg-slate-200 hover:bg-slate-300 text-sm text-slate-800">Close</button>
            </div>
            <input id="editProductId" type="hidden">
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block text-sm mb-1">Title</label>
                    <input id="editProductTitle" type="text" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div>
                    <label class="block text-sm mb-1">Description</label>
                    <textarea id="editProductDescription" rows="3" class="w-full px-3 py-2 rounded bg-white border border-slate-300"></textarea>
                </div>
                <div>
                    <label class="block text-sm mb-1">Button Label</label>
                    <input id="editProductButtonLabel" type="text" class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
                <div>
                    <label class="block text-sm mb-1">URL (for web apps)</label>
                    <input id="editProductUrl" type="text" placeholder="/path/ or https://..." class="w-full px-3 py-2 rounded bg-white border border-slate-300">
                </div>
            </div>
            <div class="mt-4 flex items-center gap-3">
                <button id="saveEditBtn" class="px-4 py-2 rounded bg-amber-600 hover:bg-amber-500 text-sm font-semibold">Save Changes</button>
                <span id="editStatus" class="text-sm text-slate-600"></span>
            </div>
        </div>
    </div>

    <script>
    (function () {
        const SUPERADMIN_EMAIL = 'Ehsan0921@gmail.com';
        const firebaseConfig = {
            apiKey: "AIzaSyA__FJwWy6VcRyWS1cO3Jmol6BcJSEiVdA",
            authDomain: "ehsanmo.firebaseapp.com",
            projectId: "ehsanmo",
            storageBucket: "ehsanmo.firebasestorage.app",
            messagingSenderId: "287723741565",
            appId: "1:287723741565:web:4be1f44d27dbe60f48ac14",
            measurementId: "G-347B8XCFLX"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        const notAuthorized = document.getElementById('notAuthorized');
        const adminContent = document.getElementById('adminContent');
        const tbody = document.getElementById('productsTableBody');
        const createBtn = document.getElementById('createProductBtn');
        const testBtn = document.getElementById('testAccessBtn');
        const seedDefaultsBtn = document.getElementById('seedDefaultsBtn');
        const createStatus = document.getElementById('createStatus');
        const addUpdateBtn = document.getElementById('addUpdateBtn');
        const updateStatus = document.getElementById('updateStatus');
        const updateProductIdSelect = document.getElementById('updateProductId');
        const addProductModal = document.getElementById('addProductModal');
        const updateProductModal = document.getElementById('updateProductModal');
        const editProductModal = document.getElementById('editProductModal');
        const openAddProductModalBtn = document.getElementById('openAddProductModalBtn');
        const closeAddProductModalBtn = document.getElementById('closeAddProductModalBtn');
        const openUpdateModalBtn = document.getElementById('openUpdateModalBtn');
        const closeUpdateModalBtn = document.getElementById('closeUpdateModalBtn');
        const closeEditModalBtn = document.getElementById('closeEditModalBtn');
        const saveEditBtn = document.getElementById('saveEditBtn');
        const editStatus = document.getElementById('editStatus');
        const productIsWebapp = document.getElementById('productIsWebapp');
        const webappUrlField = document.getElementById('webappUrlField');
        const downloadFields = document.getElementById('downloadFields');

        function openModal(el) {
            if (!el) return;
            el.classList.add('active');
        }

        function closeModal(el) {
            if (!el) return;
            el.classList.remove('active');
        }

        if (productIsWebapp) {
            productIsWebapp.addEventListener('change', () => {
                if (productIsWebapp.checked) {
                    webappUrlField.classList.remove('hidden');
                    downloadFields.classList.add('hidden');
                } else {
                    webappUrlField.classList.add('hidden');
                    downloadFields.classList.remove('hidden');
                }
            });
        }

        if (openAddProductModalBtn) openAddProductModalBtn.addEventListener('click', () => openModal(addProductModal));
        if (closeAddProductModalBtn) closeAddProductModalBtn.addEventListener('click', () => closeModal(addProductModal));
        if (openUpdateModalBtn) openUpdateModalBtn.addEventListener('click', () => openModal(updateProductModal));
        if (closeUpdateModalBtn) closeUpdateModalBtn.addEventListener('click', () => closeModal(updateProductModal));
        if (closeEditModalBtn) closeEditModalBtn.addEventListener('click', () => closeModal(editProductModal));
        [addProductModal, updateProductModal, editProductModal].forEach((modal) => {
            if (!modal) return;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal(modal);
            });
        });

        function esc(v) {
            return String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function slugify(text) {
            return String(text || '')
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '') || ('product-' + Date.now());
        }

        async function safeDeleteStoragePath(path) {
            if (!path) return;
            try {
                await storage.ref().child(path).delete();
            } catch (e) {}
        }

        async function loadProducts() {
            tbody.innerHTML = '';
            const snap = await db.collection('products').get();
            const items = [];
            snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
            items.sort((a,b) => {
                const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
                const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
                return tb - ta;
            });
            // Fill update product selector
            if (updateProductIdSelect) {
                updateProductIdSelect.innerHTML = '';
                items.forEach((item) => {
                    const opt = document.createElement('option');
                    opt.value = item.id;
                    opt.textContent = item.title || item.id;
                    updateProductIdSelect.appendChild(opt);
                });
            }

            items.forEach((item) => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-200';
                const currentVersion = item.currentVersion || null;
                const isWebapp = item.type === 'webapp';
                const typeBadge = isWebapp
                    ? '<span class="inline-block px-2 py-0.5 rounded bg-amber-100 text-amber-700 text-xs mr-1">Web App</span>'
                    : '<span class="inline-block px-2 py-0.5 rounded bg-blue-100 text-blue-700 text-xs mr-1">Download</span>';
                tr.innerHTML = `
                    <td class="py-2 pr-4">
                        <div class="font-medium">${esc(item.title)} ${typeBadge}</div>
                        <div class="text-xs text-slate-500">${esc(item.description || '')}</div>
                    </td>
                    <td class="py-2 pr-4">
                        ${isWebapp
                            ? `<a href="${esc(item.url || '#')}" target="${(item.url || '').startsWith('http') ? '_blank' : '_self'}" rel="noopener noreferrer" class="inline-block px-2 py-0.5 rounded bg-slate-100 text-slate-600 text-xs hover:bg-slate-200">${esc(item.url || '')}${(item.url || '').startsWith('http') ? ' ↗' : ''}</a>`
                            : (currentVersion ? `<span class="inline-block px-2 py-0.5 rounded bg-slate-100 text-slate-600 text-xs">${esc(currentVersion.version || '')}</span>` : '-')
                        }
                        ${!isWebapp ? `<div class="text-xs text-slate-500">Versions: ${Array.isArray(item.versions) ? item.versions.length : (currentVersion ? 1 : 0)}</div>` : ''}
                    </td>
                    <td class="py-2 pr-4">${isWebapp ? '-' : (item.downloadCount || 0).toLocaleString()}</td>
                    <td class="py-2 pr-4">${item.isActive === false ? 'No' : 'Yes'}</td>
                    <td class="py-2 pr-4">
                        <button data-id="${item.id}" class="edit px-2 py-1 bg-amber-600 hover:bg-amber-500 rounded text-xs mr-1">Edit</button>
                        ${!isWebapp ? `<button data-id="${item.id}" class="open-update px-2 py-1 bg-indigo-700 rounded text-xs mr-1">Update</button>` : ''}
                        <button data-id="${item.id}" data-active="${item.isActive === false ? '0' : '1'}" class="toggle px-2 py-1 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded text-xs mr-1">${item.isActive === false ? 'Activate' : 'Deactivate'}</button>
                        <button data-id="${item.id}" class="delete px-2 py-1 bg-red-700 rounded text-xs">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            tbody.querySelectorAll('button.open-update').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-id');
                    if (updateProductIdSelect) updateProductIdSelect.value = id;
                    openModal(updateProductModal);
                });
            });

            tbody.querySelectorAll('button.edit').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const doc = await db.collection('products').doc(id).get();
                    if (!doc.exists) return;
                    const data = doc.data();
                    document.getElementById('editProductId').value = id;
                    document.getElementById('editProductTitle').value = data.title || '';
                    document.getElementById('editProductDescription').value = data.description || '';
                    document.getElementById('editProductButtonLabel').value = data.buttonLabel || 'Download';
                    document.getElementById('editProductUrl').value = data.url || '';
                    editStatus.textContent = '';
                    openModal(editProductModal);
                });
            });

            tbody.querySelectorAll('button.toggle').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const active = btn.getAttribute('data-active') === '1';
                    await db.collection('products').doc(id).update({ isActive: !active });
                    await loadProducts();
                });
            });

            tbody.querySelectorAll('button.delete').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    if (!confirm('Delete this product?')) return;
                    const doc = await db.collection('products').doc(id).get();
                    const data = doc.exists ? doc.data() : null;
                    if (data && data.type !== 'webapp') {
                        const versions = (data && Array.isArray(data.versions)) ? data.versions : [];
                        if (versions.length) {
                            for (const v of versions) {
                                await safeDeleteStoragePath(v.storagePath);
                            }
                        } else if (data && data.storagePath) {
                            await safeDeleteStoragePath(data.storagePath);
                        }
                    }
                    await db.collection('products').doc(id).delete();
                    await loadProducts();
                });
            });
        }

        createBtn.addEventListener('click', async () => {
            const title = document.getElementById('productTitle').value.trim();
            const desc = document.getElementById('productDescription').value.trim();
            const buttonLabel = document.getElementById('productButtonLabel').value.trim() || 'Download';
            const active = document.getElementById('productActive').checked;
            const isWebapp = document.getElementById('productIsWebapp').checked;
            const url = document.getElementById('productUrl').value.trim();
            const fileInput = document.getElementById('productFile');
            const file = fileInput.files[0];
            const version = (document.getElementById('productVersion').value || 'v1.0.0').trim();
            const versionNotes = (document.getElementById('productVersionNotes').value || '').trim();

            if (!title) {
                createStatus.textContent = 'Title is required.';
                return;
            }
            if (isWebapp && !url) {
                createStatus.textContent = 'URL is required for web apps.';
                return;
            }
            if (!isWebapp && !file) {
                createStatus.textContent = 'File is required for download products.';
                return;
            }

            createBtn.disabled = true;
            createStatus.textContent = isWebapp ? 'Creating...' : 'Uploading...';
            try {
                if (isWebapp) {
                    await db.collection('products').add({
                        title,
                        description: desc,
                        buttonLabel,
                        isActive: active,
                        type: 'webapp',
                        url,
                        downloadCount: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    const safeName = Date.now() + '_' + file.name.replace(/\s+/g, '_');
                    const slug = slugify(title);
                    const ref = storage.ref().child(`EhsanMopersonal-website/products/${slug}/${version}/${safeName}`);
                    await ref.put(file);
                    const fileUrl = await ref.getDownloadURL();
                    const verObj = {
                        version,
                        notes: versionNotes,
                        fileName: file.name,
                        fileUrl,
                        storagePath: ref.fullPath,
                        createdAt: new Date().toISOString()
                    };

                    await db.collection('products').add({
                        title,
                        description: desc,
                        buttonLabel,
                        isActive: active,
                        type: 'download',
                        slug,
                        currentVersion: verObj,
                        versions: [verObj],
                        fileName: file.name,
                        fileUrl,
                        storagePath: ref.fullPath,
                        downloadCount: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                createStatus.textContent = 'Product created.';
                document.getElementById('productTitle').value = '';
                document.getElementById('productDescription').value = '';
                document.getElementById('productButtonLabel').value = '';
                document.getElementById('productUrl').value = '';
                document.getElementById('productIsWebapp').checked = false;
                webappUrlField.classList.add('hidden');
                downloadFields.classList.remove('hidden');
                document.getElementById('productFile').value = '';
                document.getElementById('productVersion').value = 'v1.0.0';
                document.getElementById('productVersionNotes').value = '';
                document.getElementById('productActive').checked = true;
                closeModal(addProductModal);
                await loadProducts();
            } catch (e) {
                createStatus.textContent = 'Failed: ' + (e.message || 'unknown error');
            } finally {
                createBtn.disabled = false;
            }
        });

        addUpdateBtn.addEventListener('click', async () => {
            const productId = updateProductIdSelect.value;
            const version = (document.getElementById('updateVersion').value || '').trim();
            const notes = (document.getElementById('updateNotes').value || '').trim();
            const file = document.getElementById('updateFile').files[0];
            const removeOlder = document.getElementById('removeOlderVersions').checked;

            if (!productId || !version || !file) {
                updateStatus.textContent = 'Product, version, and file are required.';
                return;
            }

            addUpdateBtn.disabled = true;
            updateStatus.textContent = 'Uploading update...';
            try {
                const productRef = db.collection('products').doc(productId);
                const productSnap = await productRef.get();
                if (!productSnap.exists) throw new Error('Product not found.');
                const p = productSnap.data();
                const slug = p.slug || slugify(p.title || productId);
                const safeName = Date.now() + '_' + file.name.replace(/\s+/g, '_');
                const fileRef = storage.ref().child(`EhsanMopersonal-website/products/${slug}/${version}/${safeName}`);
                await fileRef.put(file);
                const fileUrl = await fileRef.getDownloadURL();
                const verObj = {
                    version,
                    notes,
                    fileName: file.name,
                    fileUrl,
                    storagePath: fileRef.fullPath,
                    createdAt: new Date().toISOString()
                };

                const prevVersions = Array.isArray(p.versions) ? p.versions : (p.currentVersion ? [p.currentVersion] : []);
                if (removeOlder) {
                    for (const v of prevVersions) await safeDeleteStoragePath(v.storagePath);
                }
                const nextVersions = removeOlder ? [verObj] : [...prevVersions, verObj];

                await productRef.update({
                    slug,
                    currentVersion: verObj,
                    versions: nextVersions,
                    fileName: file.name,
                    fileUrl,
                    storagePath: fileRef.fullPath,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                updateStatus.textContent = 'Update uploaded.';
                document.getElementById('updateVersion').value = 'v1.0.1';
                document.getElementById('updateNotes').value = '';
                document.getElementById('updateFile').value = '';
                document.getElementById('removeOlderVersions').checked = false;
                closeModal(updateProductModal);
                await loadProducts();
            } catch (e) {
                updateStatus.textContent = 'Failed: ' + (e.message || 'unknown error');
            } finally {
                addUpdateBtn.disabled = false;
            }
        });

        saveEditBtn.addEventListener('click', async () => {
            const id = document.getElementById('editProductId').value;
            const title = document.getElementById('editProductTitle').value.trim();
            const description = document.getElementById('editProductDescription').value.trim();
            const buttonLabel = document.getElementById('editProductButtonLabel').value.trim() || 'Download';
            const url = document.getElementById('editProductUrl').value.trim();
            if (!id) return;
            if (!title) {
                editStatus.textContent = 'Title is required.';
                return;
            }
            saveEditBtn.disabled = true;
            editStatus.textContent = 'Saving...';
            try {
                const updateData = {
                    title,
                    description,
                    buttonLabel
                };
                if (url) updateData.url = url;
                await db.collection('products').doc(id).update(updateData);
                editStatus.textContent = 'Saved.';
                closeModal(editProductModal);
                await loadProducts();
            } catch (e) {
                editStatus.textContent = 'Failed: ' + (e.message || 'unknown error');
            } finally {
                saveEditBtn.disabled = false;
            }
        });

        seedDefaultsBtn.addEventListener('click', async () => {
            createStatus.textContent = 'Seeding default products...';
            seedDefaultsBtn.disabled = true;
            try {
                const defaults = [
                    {
                        title: 'Perforated Panel Designer',
                        description: 'Upload an image, generate panel perforation, export PNG, CAD, and project settings.',
                        buttonLabel: 'Open',
                        type: 'webapp',
                        url: '/Image-Panel-perforated-designer/',
                        isActive: true,
                        downloadCount: 0
                    },
                    {
                        title: 'Gym Records Tracker',
                        description: 'Log sets, reps, and weight, session time, goals, body weight, reports, and share links.',
                        buttonLabel: 'Open',
                        type: 'webapp',
                        url: '/gym-records/',
                        isActive: true,
                        downloadCount: 0
                    }
                ];
                let created = 0;
                for (const def of defaults) {
                    const existing = await db.collection('products').where('type', '==', def.type).where('url', '==', def.url).limit(1).get();
                    if (existing.empty) {
                        await db.collection('products').add({
                            ...def,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        created++;
                    }
                }
                createStatus.textContent = `Seeded ${created} product(s).`;
                await loadProducts();
            } catch (e) {
                createStatus.textContent = 'Seed failed: ' + (e.message || 'unknown error');
            } finally {
                seedDefaultsBtn.disabled = false;
            }
        });

        testBtn.addEventListener('click', async () => {
            createStatus.textContent = 'Running tests...';
            testBtn.disabled = true;
            try {
                const user = auth.currentUser;
                if (!user || !user.email) throw new Error('Not logged in.');
                if (user.email.toLowerCase() !== SUPERADMIN_EMAIL.toLowerCase()) {
                    throw new Error('Logged in, but not superadmin.');
                }

                // Ensure user document exists with isAdmin=true
                const userRef = db.collection('users').doc(user.uid);
                const userDoc = await userRef.get();
                if (!userDoc.exists) {
                    await userRef.set({
                        email: user.email,
                        displayName: user.displayName || '',
                        photoURL: user.photoURL || '',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                        isAdmin: true,
                        downloadCount: 0
                    });
                } else if (!userDoc.data().isAdmin) {
                    await userRef.update({ isAdmin: true });
                }

                // Firestore read test
                try {
                    await db.collection('products').limit(1).get();
                } catch (e) {
                    throw new Error('Firestore permission failed (products read).');
                }

                // Firestore write test (single temp doc)
                const testDocRef = db.collection('products').doc('perm_test_' + Date.now());
                try {
                    await testDocRef.set({
                        title: 'perm-test',
                        isActive: false,
                        downloadCount: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await testDocRef.delete();
                } catch (e) {
                    throw new Error('Firestore permission failed (products write/delete).');
                }

                // Storage write/delete test in products path
                const testPath = 'products/test_' + Date.now() + '.txt';
                const testRef = storage.ref().child(testPath);
                try {
                    await testRef.put(new Blob(['firebase access test'], { type: 'text/plain' }));
                    await testRef.delete();
                } catch (e) {
                    throw new Error('Storage permission failed (products write/delete).');
                }

                createStatus.textContent = 'Test passed: Auth, Firestore, and Storage permissions are OK.';
            } catch (e) {
                createStatus.textContent = 'Test failed: ' + (e && e.message ? e.message : 'Unknown error');
            } finally {
                testBtn.disabled = false;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try { await auth.signOut(); } catch(e) {}
            location.href = '/';
        });

        auth.onAuthStateChanged(async (user) => {
            if (!user || !user.email || user.email.toLowerCase() !== SUPERADMIN_EMAIL.toLowerCase()) {
                notAuthorized.classList.remove('hidden');
                adminContent.classList.add('hidden');
                return;
            }
            notAuthorized.classList.add('hidden');
            adminContent.classList.remove('hidden');
            await loadProducts();
        });
    })();
    </script>
</body>
</html>
